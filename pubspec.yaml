name: pay_vault
description: "PayVault - Payroll Management Desktop Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.18.0
  drift_sqflite: ^2.0.1
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.0
  path: ^1.9.0
  pdf: ^3.10.0
  file_picker: ^8.0.0
  provider: ^6.1.0
  crypto: ^3.0.3
  intl: ^0.19.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.0
  uuid: ^4.3.3
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
